name: Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish or refresh, for example v0.1.8
        required: false
        type: string
      publish_release:
        description: Upload the built artifacts to a GitHub Release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
      release_label: ${{ steps.vars.outputs.release_label }}
      should_publish: ${{ steps.vars.outputs.should_publish }}
    steps:
      - id: vars
        shell: bash
        run: |
          release_tag=""
          should_publish="false"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            should_publish="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            input_tag="${{ inputs.release_tag }}"
            input_publish="${{ inputs.publish_release }}"
            if [[ -n "$input_tag" ]]; then
              release_tag="$input_tag"
            fi
            if [[ "$input_publish" == "true" && -n "$release_tag" ]]; then
              should_publish="true"
            fi
          fi

          release_label="$release_tag"
          if [[ -z "$release_label" ]]; then
            release_label="${GITHUB_SHA::7}"
          fi

          release_label="$(echo "$release_label" | sed -E 's/[^0-9A-Za-z._-]/-/g')"

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_label=$release_label" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: npm ci
      - name: Build Windows app
        shell: pwsh
        run: |
          npx vite build
          npx electron-builder --win --publish never
      - name: Package Windows release
        shell: pwsh
        run: |
          $label = '${{ needs.prepare.outputs.release_label }}'
          $zip = "release/ScriptPlayerPlus-$label-win-x64.zip"
          if (Test-Path -LiteralPath $zip) {
            Remove-Item -LiteralPath $zip -Force
          }
          Compress-Archive -Path release/win-unpacked/* -DestinationPath $zip
      - name: Upload Windows release assets
        if: needs.prepare.outputs.should_publish == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ needs.prepare.outputs.release_tag }}'
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --generate-notes
          }
          $assets = @()
          foreach ($pattern in @('release/ScriptPlayerPlus-*-win-x64.zip', 'release/*.exe', 'release/*.exe.blockmap', 'release/latest.yml')) {
            $assets += Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          }
          if ($assets.Count -gt 0) {
            gh release upload $tag $assets --clobber
          }

  build-mac:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: npm ci
      - run: npx vite build
      - run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Verify macOS app signatures
        shell: bash
        run: |
          set -euo pipefail

          found=0
          while IFS= read -r -d '' app; do
            found=1
            echo "Verifying $app"
            if [[ ! -f "$app/Contents/_CodeSignature/CodeResources" ]]; then
              echo "Missing $app/Contents/_CodeSignature/CodeResources"
              exit 1
            fi
            codesign --verify --deep --strict --verbose=2 "$app"
            details="$(codesign -dv --verbose=4 "$app" 2>&1)"
            echo "$details" | grep -E 'Signature=|Info.plist|Sealed Resources'
            echo "$details" | grep -q 'Info.plist'
            echo "$details" | grep -q 'Sealed Resources'

            requirement="$(codesign -d -r- "$app" 2>&1)"
            echo "$requirement"
            echo "$requirement" | grep -q 'designated => identifier "com.scriptplayerplus.app"'
            if echo "$requirement" | grep -q 'designated => cdhash'; then
              echo "Unexpected cdhash designated requirement for $app"
              exit 1
            fi
          done < <(find release -maxdepth 3 -type d -name 'ScriptPlayerPlus.app' -print0)

          if [[ "$found" -ne 1 ]]; then
            echo "No macOS app bundle found to verify."
            exit 1
          fi
      - name: Upload macOS release assets
        if: needs.prepare.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          tag="${{ needs.prepare.outputs.release_tag }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --generate-notes || true
          assets=(release/*.zip release/*.zip.blockmap release/*.dmg release/*.dmg.blockmap)
          if [[ -f release/latest-mac.yml ]]; then
            assets+=(release/latest-mac.yml)
          fi
          gh release upload "$tag" "${assets[@]}" --clobber

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: npm ci
      - run: npx vite build
      - run: npx electron-builder --linux --publish never
      - name: Upload Linux release assets
        if: needs.prepare.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          tag="${{ needs.prepare.outputs.release_tag }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --generate-notes || true
          assets=(release/*.AppImage release/*.AppImage.blockmap release/*.deb release/*.tar.gz)
          if [[ -f release/latest-linux.yml ]]; then
            assets+=(release/latest-linux.yml)
          fi
          gh release upload "$tag" "${assets[@]}" --clobber

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-windows
      - build-mac
      - build-linux
    if: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - id: notes
        shell: bash
        run: |
          tag="${{ needs.prepare.outputs.release_tag }}"
          notes_path="docs/releases/${tag}.md"
          if [[ -f "$notes_path" ]]; then
            echo "body_path=$notes_path" >> "$GITHUB_OUTPUT"
            echo "has_body_path=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_body_path=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        if: steps.notes.outputs.has_body_path == 'true'
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: release-assets/*
          body_path: ${{ steps.notes.outputs.body_path }}
          overwrite_files: true
          prerelease: ${{ contains(needs.prepare.outputs.release_tag, '-') }}
      - uses: softprops/action-gh-release@v2
        if: steps.notes.outputs.has_body_path != 'true'
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: release-assets/*
          generate_release_notes: true
          overwrite_files: true
          prerelease: ${{ contains(needs.prepare.outputs.release_tag, '-') }}
